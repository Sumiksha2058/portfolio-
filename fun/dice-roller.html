<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Dice Roller - Sumiksha Neupane | Portfolio</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=EB+Garamond:wght@500&display=swap');

        .dice-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle, #3d2b1f 0%, #1a0f0a 100%);
            padding: 20px;
            color: #f1c40f;
        }

        .dice-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #d4af37;
            margin-bottom: 3rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .dice-wrapper {
            display: flex;
            gap: 4rem;
            margin-bottom: 4rem;
            perspective: 1000px;
        }

        .dice-scene {
            width: 100px;
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
        }

        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .dice-face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: #fdf5e6;
            border: 2px solid #d4af37;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 10px;
            box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(139, 69, 19, 0.2);
        }

        .dot {
            width: 14px;
            height: 14px;
            background-color: #3d2b1f;
            border-radius: 50%;
            align-self: center;
            justify-self: center;
        }

        /* Face rotations */
        .face-1 { transform: rotateY(0deg) translateZ(50px); }
        .face-2 { transform: rotateY(90deg) translateZ(50px); }
        .face-3 { transform: rotateX(90deg) translateZ(50px); }
        .face-4 { transform: rotateX(-90deg) translateZ(50px); }
        .face-5 { transform: rotateY(-90deg) translateZ(50px); }
        .face-6 { transform: rotateY(180deg) translateZ(50px); }

        /* Dot positions */
        .face-1 .dot:nth-child(1) { grid-area: 2 / 2; }
        
        .face-2 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-2 .dot:nth-child(2) { grid-area: 3 / 3; }
        
        .face-3 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-3 .dot:nth-child(2) { grid-area: 2 / 2; }
        .face-3 .dot:nth-child(3) { grid-area: 3 / 3; }
        
        .face-4 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-4 .dot:nth-child(2) { grid-area: 1 / 3; }
        .face-4 .dot:nth-child(3) { grid-area: 3 / 1; }
        .face-4 .dot:nth-child(4) { grid-area: 3 / 3; }
        
        .face-5 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-5 .dot:nth-child(2) { grid-area: 1 / 3; }
        .face-5 .dot:nth-child(3) { grid-area: 2 / 2; }
        .face-5 .dot:nth-child(4) { grid-area: 3 / 1; }
        .face-5 .dot:nth-child(5) { grid-area: 3 / 3; }
        
        .face-6 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-6 .dot:nth-child(2) { grid-area: 1 / 3; }
        .face-6 .dot:nth-child(3) { grid-area: 2 / 1; }
        .face-6 .dot:nth-child(4) { grid-area: 2 / 3; }
        .face-6 .dot:nth-child(5) { grid-area: 3 / 1; }
        .face-6 .dot:nth-child(6) { grid-area: 3 / 3; }

        .roll-btn {
            padding: 15px 50px;
            font-size: 1.5rem;
            background: #3d2b1f;
            color: #d4af37;
            border: 2px solid #d4af37;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'EB Garamond', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .roll-btn:hover {
            background: #d4af37;
            color: #3d2b1f;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            transform: translateY(-3px);
        }

        .roll-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-text {
            font-family: 'EB Garamond', serif;
            font-size: 2rem;
            color: #d4af37;
            height: 3rem;
            text-align: center;
        }

        .back-btn {
            margin-top: 2rem;
            color: #d4af37;
            text-decoration: none;
            font-family: 'EB Garamond', serif;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .back-btn:hover {
            border-bottom: 1px solid #d4af37;
        }

        @media (max-width: 480px) {
            .dice-wrapper { gap: 2rem; }
            .dice-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="dice-container">
        <h1 class="dice-title">Vintage Dice Roller</h1>
        
        <div class="dice-wrapper">
            <div class="dice-scene">
                <div id="dice-1" class="dice">
                    <div class="dice-face face-1"><div class="dot"></div></div>
                    <div class="dice-face face-2"><div class="dot"></div><div class="dot"></div></div>
                    <div class="dice-face face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="dice-face face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="dice-face face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="dice-face face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </div>
            </div>

            <div class="dice-scene">
                <div id="dice-2" class="dice">
                    <div class="dice-face face-1"><div class="dot"></div></div>
                    <div class="dice-face face-2"><div class="dot"></div><div class="dot"></div></div>
                    <div class="dice-face face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="dice-face face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="dice-face face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="dice-face face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </div>
            </div>
        </div>

        <button id="roll-button" class="roll-btn" onclick="rollDice()">Roll Dice</button>
        <div id="result" class="result-text">Click to Roll</div>
        
        <a href="fun.html" class="back-btn">← Back to Fun Section</a>
    </div>

    <script>
        const dice1 = document.getElementById('dice-1');
        const dice2 = document.getElementById('dice-2');
        const rollBtn = document.getElementById('roll-button');
        const resultText = document.getElementById('result');

        // Fixed rotation values for each face
        const faceRotations = {
            1: { x: 0, y: 0 },
            2: { x: 0, y: -90 },
            3: { x: -90, y: 0 },
            4: { x: 90, y: 0 },
            5: { x: 0, y: 90 },
            6: { x: 0, y: 180 }
        };

        let currentRotation1 = { x: 0, y: 0 };
        let currentRotation2 = { x: 0, y: 0 };

        function rollDice() {
            rollBtn.disabled = true;
            resultText.textContent = 'Rolling...';

            const val1 = Math.floor(Math.random() * 6) + 1;
            const val2 = Math.floor(Math.random() * 6) + 1;

            // Add multiple full rotations for effect
            const extraRotations = 5 * 360;
            
            const targetRot1 = faceRotations[val1];
            const targetRot2 = faceRotations[val2];

            currentRotation1.x += extraRotations + targetRot1.x;
            currentRotation1.y += extraRotations + targetRot1.y;
            currentRotation2.x += extraRotations + targetRot2.x;
            currentRotation2.y += extraRotations + targetRot2.y;

            dice1.style.transform = `rotateX(${currentRotation1.x}deg) rotateY(${currentRotation1.y}deg)`;
            dice2.style.transform = `rotateX(${currentRotation2.x}deg) rotateY(${currentRotation2.y}deg)`;

            setTimeout(() => {
                resultText.textContent = `You rolled a ${val1} and ${val2} (Total: ${val1 + val2})! 🎉`;
                rollBtn.disabled = false;
            }, 1500);
        }
    </script>
</body>
</html>
