<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Background Remover - Sumiksha Neupane | Portfolio</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .remover-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
        }

        .remover-box {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            text-align: center;
            color: #333;
        }

        .upload-section {
            margin-bottom: 2rem;
            padding: 2rem;
            border: 2px solid #eee;
            border-radius: 15px;
        }

        .file-input-label {
            display: block;
            margin-bottom: 1rem;
            font-weight: 600;
            color: #666;
        }

        #file-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 1rem;
        }

        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 2rem;
            display: none;
        }

        .preview-item {
            text-align: center;
        }

        .preview-item h4 {
            margin-bottom: 10px;
            color: #666;
        }

        .preview-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background-image: 
                linear-gradient(45deg, #eee 25%, transparent 25%), 
                linear-gradient(-45deg, #eee 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #eee 75%), 
                linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            min-height: 150px;
            object-fit: contain;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-remove {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-remove:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-download {
            background: #28a745;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            display: none;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-text {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .back-btn {
            margin-top: 2rem;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .back-btn:hover {
            background-color: white;
            color: #667eea;
        }

        #debug-log {
            margin-top: 2rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #333;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            width: 100%;
        }

        @media (max-width: 600px) {
            .preview-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">Sumiksha Neupane</div>
            <ul class="nav-menu">
                <li><a href="../index.html#home" class="nav-link">Home</a></li>
                <li><a href="fun.html" class="nav-link">Back to Fun</a></li>
            </ul>
        </div>
    </nav>

    <div class="remover-container">
        <div class="remover-box">
            <h2 style="margin-bottom: 1rem;">✨ AI Background Remover</h2>
            <p style="margin-bottom: 2rem; color: #666;">Remove backgrounds from your images entirely in your browser. No data leaves your device!</p>
            
            <div class="upload-section">
                <label for="file-input" class="file-input-label">Select an image to start:</label>
                <input type="file" id="file-input" accept="image/*">
            </div>

            <div class="preview-container" id="preview-container">
                <div class="preview-item">
                    <h4>Original</h4>
                    <img id="original-preview" class="preview-img" alt="Original Image">
                </div>
                <div class="preview-item">
                    <h4>Result</h4>
                    <img id="result-preview" class="preview-img" alt="Background Removed Image">
                </div>
            </div>

            <div class="controls">
                <button id="remove-btn" class="btn-remove" disabled>Remove Background</button>
                <a id="download-btn" class="btn-download" download="removed-bg.png">Download Result</a>
            </div>

            <div id="debug-log"></div>
        </div>
        <a href="fun.html" class="back-btn">← Back to Fun Section</a>
    </div>

    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div class="progress-text" id="status-text">Processing...</div>
        <p style="max-width: 300px; text-align: center; font-size: 0.9rem; opacity: 0.8;">
            The first run may take a moment to download the AI model (~40MB).
        </p>
    </div>

    <script src="../js/script.js"></script>
    <script type="module">
        // Use a more compatible version of the library
        import imglyRemoveBackground from "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/index.js";

        const fileInput = document.getElementById('file-input');
        const removeBtn = document.getElementById('remove-btn');
        const downloadBtn = document.getElementById('download-btn');
        const previewContainer = document.getElementById('preview-container');
        const originalPreview = document.getElementById('original-preview');
        const resultPreview = document.getElementById('result-preview');
        const loadingOverlay = document.getElementById('loading-overlay');
        const statusText = document.getElementById('status-text');
        const debugLog = document.getElementById('debug-log');

        let selectedFile = null;
        let resultUrl = null;

        function log(msg) {
            console.log(msg);
            debugLog.style.display = 'block';
            debugLog.innerHTML += `> ${msg}<br>`;
            debugLog.scrollTop = debugLog.scrollHeight;
        }

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            log(`File selected: ${file.name} (${file.type})`);
            if (!file.type.startsWith('image/')) {
                alert('Please upload an image file.');
                return;
            }
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                originalPreview.src = e.target.result;
                previewContainer.style.display = 'grid';
                removeBtn.disabled = false;
                downloadBtn.style.display = 'none';
                resultPreview.src = '';
                
                if (resultUrl) {
                    URL.revokeObjectURL(resultUrl);
                    resultUrl = null;
                }
                log("Preview updated.");
            };
            reader.readAsDataURL(file);
        }

        removeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            log("Starting background removal...");
            loadingOverlay.style.display = 'flex';
            statusText.textContent = 'Initializing AI...';
            removeBtn.disabled = true;

            try {
                // Configuration for maximum compatibility
                const config = {
                    progress: (key, current, total) => {
                        const percent = Math.round((current / total) * 100);
                        statusText.textContent = `Processing: ${percent}%`;
                        if (percent % 10 === 0) log(`Progress: ${percent}%`);
                    },
                    model: 'isnet_fp16',
                    device: 'cpu', // Force CPU for maximum compatibility
                };

                log("Calling AI library...");
                const blob = await imglyRemoveBackground(selectedFile, config);
                log("AI processing complete. Creating result URL...");
                
                resultUrl = URL.createObjectURL(blob);
                resultPreview.src = resultUrl;
                
                resultPreview.onload = () => {
                    log("Result image rendered.");
                    downloadBtn.href = resultUrl;
                    downloadBtn.style.display = 'inline-block';
                    loadingOverlay.style.display = 'none';
                    removeBtn.disabled = false;
                };

            } catch (error) {
                log(`ERROR: ${error.message}`);
                console.error(error);
                alert('Error: ' + error.message);
                loadingOverlay.style.display = 'none';
                removeBtn.disabled = false;
            }
        });

        log("System initialized. Ready for image selection.");
    </script>
</body>
</html>
