<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Stopwatch - Sumiksha Neupane | Portfolio</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .stopwatch-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            background: linear-gradient(135deg, #2c3e50, #000000);
            padding: 20px;
            color: white;
        }

        .stopwatch-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Analog Clock Styles */
        .clock-face {
            width: 300px;
            height: 300px;
            border: 10px solid #ecf0f1;
            border-radius: 50%;
            position: relative;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
        }

        .clock-face::after {
            content: '';
            width: 15px;
            height: 15px;
            background: #e74c3c;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            transition: transform 0.05s cubic-bezier(0.4, 2.3, 0.3, 1);
            border-radius: 5px;
        }

        .second-hand {
            width: 2px;
            height: 130px;
            background: #e74c3c;
            z-index: 8;
            transform: translateX(-50%) rotate(0deg);
        }

        .minute-hand {
            width: 4px;
            height: 110px;
            background: #2c3e50;
            z-index: 7;
            transform: translateX(-50%) rotate(0deg);
        }

        .hour-hand {
            width: 6px;
            height: 80px;
            background: #2c3e50;
            z-index: 6;
            transform: translateX(-50%) rotate(0deg);
        }

        /* Clock Numbers */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-weight: bold;
            color: #2c3e50;
            font-size: 1.2rem;
            padding: 10px;
        }

        .number1 { transform: rotate(30deg); }
        .number1 span { display: block; transform: rotate(-30deg); }
        .number2 { transform: rotate(60deg); }
        .number2 span { display: block; transform: rotate(-60deg); }
        .number3 { transform: rotate(90deg); }
        .number3 span { display: block; transform: rotate(-90deg); }
        .number4 { transform: rotate(120deg); }
        .number4 span { display: block; transform: rotate(-120deg); }
        .number5 { transform: rotate(150deg); }
        .number5 span { display: block; transform: rotate(-150deg); }
        .number6 { transform: rotate(180deg); }
        .number6 span { display: block; transform: rotate(-180deg); }
        .number7 { transform: rotate(210deg); }
        .number7 span { display: block; transform: rotate(-210deg); }
        .number8 { transform: rotate(240deg); }
        .number8 span { display: block; transform: rotate(-240deg); }
        .number9 { transform: rotate(270deg); }
        .number9 span { display: block; transform: rotate(-270deg); }
        .number10 { transform: rotate(300deg); }
        .number10 span { display: block; transform: rotate(-300deg); }
        .number11 { transform: rotate(330deg); }
        .number11 span { display: block; transform: rotate(-330deg); }
        .number12 { transform: rotate(0deg); }
        .number12 span { display: block; transform: rotate(0deg); }

        .digital-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-stopwatch {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-start { background-color: #27ae60; color: white; }
        .btn-stop { background-color: #c0392b; color: white; display: none; }
        .btn-lap { background-color: #2980b9; color: white; }
        .btn-reset { background-color: #f39c12; color: white; }

        .btn-stopwatch:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .laps-container {
            width: 100%;
            max-width: 350px;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px;
        }

        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn {
            margin-top: 2rem;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid white;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover { background-color: white; color: #2c3e50; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">Sumiksha Neupane</div>
            <ul class="nav-menu">
                <li><a href="../index.html#home" class="nav-link">Home</a></li>
                <li><a href="fun.html" class="nav-link">Back to Fun</a></li>
            </ul>
        </div>
    </nav>

    <div class="stopwatch-container">
        <h1 class="stopwatch-title">⏱️ Analog Stopwatch ⏱️</h1>
        
        <div class="clock-face">
            <div class="number number1"><span>1</span></div>
            <div class="number number2"><span>2</span></div>
            <div class="number number3"><span>3</span></div>
            <div class="number number4"><span>4</span></div>
            <div class="number number5"><span>5</span></div>
            <div class="number number6"><span>6</span></div>
            <div class="number number7"><span>7</span></div>
            <div class="number number8"><span>8</span></div>
            <div class="number number9"><span>9</span></div>
            <div class="number number10"><span>10</span></div>
            <div class="number number11"><span>11</span></div>
            <div class="number number12"><span>12</span></div>
            
            <div id="hourHand" class="hand hour-hand"></div>
            <div id="minuteHand" class="hand minute-hand"></div>
            <div id="secondHand" class="hand second-hand"></div>
        </div>

        <div class="digital-display" id="display">00:00:00.00</div>

        <div class="controls">
            <button id="startBtn" class="btn-stopwatch btn-start"><i class="fas fa-play"></i> Start</button>
            <button id="stopBtn" class="btn-stopwatch btn-stop"><i class="fas fa-stop"></i> Stop</button>
            <button id="lapBtn" class="btn-stopwatch btn-lap"><i class="fas fa-flag"></i> Lap</button>
            <button id="resetBtn" class="btn-stopwatch btn-reset"><i class="fas fa-redo"></i> Reset</button>
        </div>

        <div class="laps-container" id="laps"></div>

        <a href="fun.html" class="back-btn">← Back to Fun Section</a>
    </div>

    <script>
        let startTime;
        let elapsedTime = 0;
        let timerInterval;
        let lapCount = 0;

        const display = document.getElementById('display');
        const hourHand = document.getElementById('hourHand');
        const minuteHand = document.getElementById('minuteHand');
        const secondHand = document.getElementById('secondHand');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const lapBtn = document.getElementById('lapBtn');
        const resetBtn = document.getElementById('resetBtn');
        const lapsContainer = document.getElementById('laps');

        function updateHands(time) {
            const ms = time % 1000;
            const s = (time / 1000) % 60;
            const m = (time / (1000 * 60)) % 60;
            const h = (time / (1000 * 60 * 60)) % 12;

            const sDeg = (s * 6) + (ms * 0.006);
            const mDeg = (m * 6) + (s * 0.1);
            const hDeg = (h * 30) + (m * 0.5);

            secondHand.style.transform = `translateX(-50%) rotate(${sDeg}deg)`;
            minuteHand.style.transform = `translateX(-50%) rotate(${mDeg}deg)`;
            hourHand.style.transform = `translateX(-50%) rotate(${hDeg}deg)`;
        }

        function timeToString(time) {
            let hh = Math.floor(time / 3600000);
            let mm = Math.floor((time % 3600000) / 60000);
            let ss = Math.floor((time % 60000) / 1000);
            let ms = Math.floor((time % 1000) / 10);
            return `${hh.toString().padStart(2, "0")}:${mm.toString().padStart(2, "0")}:${ss.toString().padStart(2, "0")}.${ms.toString().padStart(2, "0")}`;
        }

        function start() {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                display.innerHTML = timeToString(elapsedTime);
                updateHands(elapsedTime);
            }, 10);
            startBtn.style.display = "none";
            stopBtn.style.display = "flex";
        }

        function stop() {
            clearInterval(timerInterval);
            startBtn.style.display = "flex";
            stopBtn.style.display = "none";
        }

        function reset() {
            stop();
            elapsedTime = 0;
            lapCount = 0;
            display.innerHTML = "00:00:00.00";
            updateHands(0);
            lapsContainer.innerHTML = '';
        }

        function lap() {
            if (elapsedTime > 0) {
                lapCount++;
                const lapItem = document.createElement('div');
                lapItem.classList.add('lap-item');
                lapItem.innerHTML = `<span>Lap ${lapCount}</span><span>${timeToString(elapsedTime)}</span>`;
                lapsContainer.prepend(lapItem);
            }
        }

        startBtn.addEventListener("click", start);
        stopBtn.addEventListener("click", stop);
        resetBtn.addEventListener("click", reset);
        lapBtn.addEventListener("click", lap);
    </script>
</body>
</html>
