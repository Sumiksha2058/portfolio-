<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Analog Stopwatch - Sumiksha Neupane | Portfolio</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=EB+Garamond:wght@500&display=swap');

        .stopwatch-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            background: radial-gradient(circle, #3d2b1f 0%, #1a0f0a 100%);
            padding: 20px;
            color: #f1c40f;
        }

        .stopwatch-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: #d4af37;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Vintage Analog Clock Styles */
        .clock-outer-rim {
            width: 340px;
            height: 340px;
            border: 15px solid #8b4513; /* Wooden Brown */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #5d2e0a; /* Darker Wood */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
            position: relative;
        }

        .clock-inner-rim {
            width: 310px;
            height: 310px;
            border: 8px solid #d4af37; /* Golden Rim */
            border-radius: 50%;
            background: #fdf5e6; /* Old Paper / Yellowish Face */
            position: relative;
            box-shadow: inset 0 0 30px rgba(139, 69, 19, 0.3);
        }

        .clock-inner-rim::after {
            content: '';
            width: 12px;
            height: 12px;
            background: #d4af37;
            border: 2px solid #8b4513;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            transition: transform 0.05s linear;
            border-radius: 5px;
        }

        .second-hand {
            width: 2px;
            height: 135px;
            background: #c0392b; /* Classic Red Second Hand */
            z-index: 9;
            transform: translateX(-50%) rotate(0deg);
        }

        .minute-hand {
            width: 5px;
            height: 115px;
            background: #d4af37; /* Golden */
            border: 1px solid #8b4513;
            z-index: 8;
            transform: translateX(-50%) rotate(0deg);
        }

        .hour-hand {
            width: 8px;
            height: 85px;
            background: #d4af37; /* Golden */
            border: 1px solid #8b4513;
            z-index: 7;
            transform: translateX(-50%) rotate(0deg);
        }

        /* Clock Numbers */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-family: 'EB Garamond', serif;
            font-weight: bold;
            color: #3d2b1f;
            font-size: 1.5rem;
            padding: 15px;
        }

        .number1 { transform: rotate(30deg); } .number1 span { display: block; transform: rotate(-30deg); }
        .number2 { transform: rotate(60deg); } .number2 span { display: block; transform: rotate(-60deg); }
        .number3 { transform: rotate(90deg); } .number3 span { display: block; transform: rotate(-90deg); }
        .number4 { transform: rotate(120deg); } .number4 span { display: block; transform: rotate(-120deg); }
        .number5 { transform: rotate(150deg); } .number5 span { display: block; transform: rotate(-150deg); }
        .number6 { transform: rotate(180deg); } .number6 span { display: block; transform: rotate(-180deg); }
        .number7 { transform: rotate(210deg); } .number7 span { display: block; transform: rotate(-210deg); }
        .number8 { transform: rotate(240deg); } .number8 span { display: block; transform: rotate(-240deg); }
        .number9 { transform: rotate(270deg); } .number9 span { display: block; transform: rotate(-270deg); }
        .number10 { transform: rotate(300deg); } .number10 span { display: block; transform: rotate(-300deg); }
        .number11 { transform: rotate(330deg); } .number11 span { display: block; transform: rotate(-330deg); }
        .number12 { transform: rotate(0deg); } .number12 span { display: block; transform: rotate(0deg); }

        .digital-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.2rem;
            background: rgba(0, 0, 0, 0.4);
            color: #d4af37;
            padding: 10px 30px;
            border-radius: 5px;
            margin-bottom: 2rem;
            border: 2px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .controls {
            display: flex;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .btn-stopwatch {
            padding: 12px 28px;
            font-size: 1rem;
            border: 2px solid #d4af37;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            font-family: 'EB Garamond', serif;
            background: #3d2b1f;
            color: #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-stopwatch:hover {
            background: #d4af37;
            color: #3d2b1f;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .btn-stop { display: none; }

        .laps-container {
            width: 100%;
            max-width: 380px;
            max-height: 180px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #8b4513;
            border-radius: 5px;
            padding: 10px;
        }

        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            font-family: 'EB Garamond', serif;
            font-size: 1.1rem;
        }

        .back-btn {
            margin-top: 2rem;
            padding: 10px 25px;
            background-color: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
            border-radius: 5px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-family: 'EB Garamond', serif;
        }

        .back-btn:hover {
            background-color: #d4af37;
            color: #3d2b1f;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .clock-outer-rim { width: 280px; height: 280px; }
            .clock-inner-rim { width: 250px; height: 250px; }
            .number { font-size: 1.2rem; padding: 10px; }
            .second-hand { height: 110px; }
            .minute-hand { height: 95px; }
            .hour-hand { height: 70px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand" style="color: #d4af37;">Sumiksha Neupane</div>
            <ul class="nav-menu">
                <li><a href="../index.html#home" class="nav-link" style="color: #d4af37;">Home</a></li>
                <li><a href="fun.html" class="nav-link" style="color: #d4af37;">Back to Fun</a></li>
            </ul>
        </div>
    </nav>

    <div class="stopwatch-container">
        <h1 class="stopwatch-title">Vintage Timepiece</h1>
        
        <div class="clock-outer-rim">
            <div class="clock-inner-rim">
                <div class="number number1"><span>I</span></div>
                <div class="number number2"><span>II</span></div>
                <div class="number number3"><span>III</span></div>
                <div class="number number4"><span>IV</span></div>
                <div class="number number5"><span>V</span></div>
                <div class="number number6"><span>VI</span></div>
                <div class="number number7"><span>VII</span></div>
                <div class="number number8"><span>VIII</span></div>
                <div class="number number9"><span>IX</span></div>
                <div class="number number10"><span>X</span></div>
                <div class="number number11"><span>XI</span></div>
                <div class="number number12"><span>XII</span></div>
                
                <div id="hourHand" class="hand hour-hand"></div>
                <div id="minuteHand" class="hand minute-hand"></div>
                <div id="secondHand" class="hand second-hand"></div>
            </div>
        </div>

        <div class="digital-display" id="display">00:00:00.00</div>

        <div class="controls">
            <button id="startBtn" class="btn-stopwatch btn-start"><i class="fas fa-play"></i> Start</button>
            <button id="stopBtn" class="btn-stopwatch btn-stop"><i class="fas fa-stop"></i> Stop</button>
            <button id="lapBtn" class="btn-stopwatch btn-lap"><i class="fas fa-flag"></i> Lap</button>
            <button id="resetBtn" class="btn-stopwatch btn-reset"><i class="fas fa-redo"></i> Reset</button>
        </div>

        <div class="laps-container" id="laps"></div>

        <a href="fun.html" class="back-btn">← Back to Fun Section</a>
    </div>

    <script>
        let startTime;
        let elapsedTime = 0;
        let timerInterval;
        let lapCount = 0;

        const display = document.getElementById('display');
        const hourHand = document.getElementById('hourHand');
        const minuteHand = document.getElementById('minuteHand');
        const secondHand = document.getElementById('secondHand');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const lapBtn = document.getElementById('lapBtn');
        const resetBtn = document.getElementById('resetBtn');
        const lapsContainer = document.getElementById('laps');

        function updateHands(time) {
            const ms = time % 1000;
            const s = (time / 1000) % 60;
            const m = (time / (1000 * 60)) % 60;
            const h = (time / (1000 * 60 * 60)) % 12;

            const sDeg = (s * 6) + (ms * 0.006);
            const mDeg = (m * 6) + (s * 0.1);
            const hDeg = (h * 30) + (m * 0.5);

            secondHand.style.transform = `translateX(-50%) rotate(${sDeg}deg)`;
            minuteHand.style.transform = `translateX(-50%) rotate(${mDeg}deg)`;
            hourHand.style.transform = `translateX(-50%) rotate(${hDeg}deg)`;
        }

        function timeToString(time) {
            let hh = Math.floor(time / 3600000);
            let mm = Math.floor((time % 3600000) / 60000);
            let ss = Math.floor((time % 60000) / 1000);
            let ms = Math.floor((time % 1000) / 10);
            return `${hh.toString().padStart(2, "0")}:${mm.toString().padStart(2, "0")}:${ss.toString().padStart(2, "0")}.${ms.toString().padStart(2, "0")}`;
        }

        function start() {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                display.innerHTML = timeToString(elapsedTime);
                updateHands(elapsedTime);
            }, 10);
            startBtn.style.display = "none";
            stopBtn.style.display = "flex";
        }

        function stop() {
            clearInterval(timerInterval);
            startBtn.style.display = "flex";
            stopBtn.style.display = "none";
        }

        function reset() {
            stop();
            elapsedTime = 0;
            lapCount = 0;
            display.innerHTML = "00:00:00.00";
            updateHands(0);
            lapsContainer.innerHTML = '';
        }

        function lap() {
            if (elapsedTime > 0) {
                lapCount++;
                const lapItem = document.createElement('div');
                lapItem.classList.add('lap-item');
                lapItem.innerHTML = `<span>Lap ${lapCount}</span><span>${timeToString(elapsedTime)}</span>`;
                lapsContainer.prepend(lapItem);
            }
        }

        startBtn.addEventListener("click", start);
        stopBtn.addEventListener("click", stop);
        resetBtn.addEventListener("click", reset);
        lapBtn.addEventListener("click", lap);
    </script>
</body>
</html>
