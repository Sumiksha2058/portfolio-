<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller - Sumiksha Neupane | Portfolio</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dice-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            background-color: var(--bg-light);
            padding: 20px;
        }

        .dice-wrapper {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            perspective: 1000px;
        }

        .dice {
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 15px;
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 10px;
            transition: transform 0.5s ease;
        }

        .dot {
            width: 15px;
            height: 15px;
            background-color: var(--text-dark);
            border-radius: 50%;
            align-self: center;
            justify-self: center;
        }

        .roll-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .roll-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .roll-btn:active {
            transform: translateY(0);
        }

        .result-text {
            margin-top: 2rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            height: 2rem;
        }

        /* Dice Dot Positions */
        .dot-1 { grid-area: 2 / 2; }
        .dot-2 { grid-area: 1 / 1; }
        .dot-3 { grid-area: 3 / 3; }
        .dot-4 { grid-area: 1 / 3; }
        .dot-5 { grid-area: 3 / 1; }
        .dot-6 { grid-area: 1 / 1; }
        .dot-7 { grid-area: 1 / 3; }
        .dot-8 { grid-area: 2 / 1; }
        .dot-9 { grid-area: 2 / 3; }
        .dot-10 { grid-area: 3 / 1; }
        .dot-11 { grid-area: 3 / 3; }

        @keyframes rolling {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.1); }
            50% { transform: rotate(180deg) scale(1.2); }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .is-rolling {
            animation: rolling 0.5s linear infinite;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">Sumiksha Neupane</div>
            <ul class="nav-menu">
                <li><a href="../index.html#home" class="nav-link">Home</a></li>
                <li><a href="fun.html" class="nav-link">Back to Fun</a></li>
            </ul>
        </div>
    </nav>

    <div class="dice-container">
        <h1 class="section-title">Dice Roller</h1>
        <div class="dice-wrapper">
            <div id="dice-1" class="dice"></div>
            <div id="dice-2" class="dice"></div>
        </div>
        <button id="roll-button" class="roll-btn">Roll Dice</button>
        <div id="result" class="result-text"></div>
    </div>

    <script>
        const dice1 = document.getElementById('dice-1');
        const dice2 = document.getElementById('dice-2');
        const rollBtn = document.getElementById('roll-button');
        const resultText = document.getElementById('result');

        const dotPositions = {
            1: [1],
            2: [2, 3],
            3: [1, 2, 3],
            4: [2, 3, 4, 5],
            5: [1, 2, 3, 4, 5],
            6: [6, 7, 8, 9, 10, 11]
        };

        function createDice(diceElement, value) {
            diceElement.innerHTML = '';
            const positions = dotPositions[value];
            positions.forEach(pos => {
                const dot = document.createElement('div');
                dot.className = `dot dot-${pos}`;
                diceElement.appendChild(dot);
            });
        }

        function rollDice() {
            rollBtn.disabled = true;
            resultText.textContent = 'Rolling...';
            dice1.classList.add('is-rolling');
            dice2.classList.add('is-rolling');

            setTimeout(() => {
                const val1 = Math.floor(Math.random() * 6) + 1;
                const val2 = Math.floor(Math.random() * 6) + 1;

                createDice(dice1, val1);
                createDice(dice2, val2);

                dice1.classList.remove('is-rolling');
                dice2.classList.remove('is-rolling');
                
                resultText.textContent = `You rolled a ${val1 + val2}!`;
                rollBtn.disabled = false;
            }, 1000);
        }

        rollBtn.addEventListener('click', rollDice);

        // Initial dice
        createDice(dice1, 1);
        createDice(dice2, 1);
    </script>
</body>
</html>
