<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Memory Game - Sumiksha Neupane | Portfolio</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=EB+Garamond:wght@500&display=swap');

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle, #3d2b1f 0%, #1a0f0a 100%);
            padding: 40px 20px;
            color: #f1c40f;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #d4af37;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stats {
            font-family: 'EB Garamond', serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 30px;
            color: #d4af37;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 600px;
            width: 100%;
        }

        .card {
            aspect-ratio: 1/1;
            background: #5d2e0a;
            border: 3px solid #d4af37;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border-radius: 7px;
        }

        .card-front {
            background: #fdf5e6;
            color: #3d2b1f;
            transform: rotateY(180deg);
        }

        .card-back {
            background: #8b4513;
            background-image: radial-gradient(#d4af37 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .controls {
            margin-top: 3rem;
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            border: 2px solid #d4af37;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'EB Garamond', serif;
            background: #3d2b1f;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #d4af37;
            color: #3d2b1f;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .back-link {
            margin-top: 2rem;
            color: #d4af37;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
            font-family: 'EB Garamond', serif;
        }

        .back-link:hover {
            border-bottom: 1px solid #d4af37;
        }

        @media (max-width: 480px) {
            .game-grid { grid-template-columns: repeat(3, 1fr); }
            .title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1 class="title">Memory Quest</h1>
        
        <div class="stats">
            <span>Moves: <span id="moves">0</span></span>
            <span>Time: <span id="timer">00:00</span></span>
        </div>

        <div class="game-grid" id="gameGrid">
            <!-- Cards will be generated here -->
        </div>

        <div class="controls">
            <button class="btn" onclick="resetGame()">New Game</button>
        </div>

        <a href="fun.html" class="back-link">← Back to Fun Section</a>
    </div>

    <script>
        const icons = [
            'fa-gem', 'fa-anchor', 'fa-bolt', 'fa-cube', 
            'fa-leaf', 'fa-bicycle', 'fa-bomb', 'fa-paper-plane'
        ];
        let cards = [...icons, ...icons];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timerInterval;
        let seconds = 0;
        let isLockBoard = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createCard(icon) {
            const card = document.createElement('div');
            card.classList.add('card');
            card.innerHTML = `
                <div class="card-face card-front"><i class="fas ${icon}"></i></div>
                <div class="card-face card-back"></div>
            `;
            card.addEventListener('click', () => flipCard(card, icon));
            return card;
        }

        function flipCard(card, icon) {
            if (isLockBoard || card.classList.contains('flipped') || flippedCards.includes(card)) return;

            if (moves === 0 && flippedCards.length === 0) startTimer();

            card.classList.add('flipped');
            flippedCards.push({ card, icon });

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').innerText = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            isLockBoard = true;
            const [card1, card2] = flippedCards;

            if (card1.icon === card2.icon) {
                matchedPairs++;
                flippedCards = [];
                isLockBoard = false;
                if (matchedPairs === icons.length) {
                    clearInterval(timerInterval);
                    setTimeout(() => alert(`Congratulations! You won in ${moves} moves and ${formatTime(seconds)}!`), 500);
                }
            } else {
                setTimeout(() => {
                    card1.card.classList.remove('flipped');
                    card2.card.classList.remove('flipped');
                    flippedCards = [];
                    isLockBoard = false;
                }, 1000);
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = formatTime(seconds);
            }, 1000);
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function resetGame() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            seconds = 0;
            isLockBoard = false;
            document.getElementById('moves').innerText = '0';
            document.getElementById('timer').innerText = '00:00';
            clearInterval(timerInterval);
            
            shuffle(cards).forEach(icon => {
                grid.appendChild(createCard(icon));
            });
        }

        // Initialize game
        resetGame();
    </script>
</body>
</html>
