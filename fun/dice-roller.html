<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dice Roller - Sumiksha Neupane | Portfolio</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dice-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
        }

        .dice-title {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .dice-wrapper {
            display: flex;
            gap: 3rem;
            margin-bottom: 3rem;
            perspective: 1200px;
        }

        .dice-scene {
            width: 120px;
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
        }

        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease-out;
        }

        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border: 2px solid #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            font-weight: bold;
        }

        /* Dice faces */
        .face-1 { transform: rotateY(0deg) translateZ(50px); }
        .face-2 { transform: rotateY(180deg) translateZ(50px); }
        .face-3 { transform: rotateY(90deg) translateZ(50px); }
        .face-4 { transform: rotateY(-90deg) translateZ(50px); }
        .face-5 { transform: rotateX(90deg) translateZ(50px); }
        .face-6 { transform: rotateX(-90deg) translateZ(50px); }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #333;
            border-radius: 50%;
            margin: 3px;
        }

        /* Dot arrangements for each face */
        .face-1 {
            justify-content: center;
        }

        .face-2 {
            justify-content: space-around;
        }

        .face-3 {
            justify-content: space-around;
        }

        .face-4 {
            justify-content: space-around;
        }

        .face-5 {
            justify-content: space-around;
        }

        .face-6 {
            justify-content: space-around;
        }

        .roll-btn {
            padding: 15px 50px;
            font-size: 1.2rem;
            background-color: white;
            color: #667eea;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .roll-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .roll-btn:active {
            transform: translateY(0);
        }

        .roll-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .result-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            height: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .back-btn {
            margin-top: 2rem;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .back-btn:hover {
            background-color: white;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .dice-wrapper {
                gap: 2rem;
            }

            .dice-scene {
                width: 100px;
                height: 100px;
            }

            .dice-title {
                font-size: 2rem;
            }

            .roll-btn {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .dice-wrapper {
                gap: 1rem;
            }

            .dice-scene {
                width: 80px;
                height: 80px;
            }

            .dice-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">Sumiksha Neupane</div>
            <ul class="nav-menu">
                <li><a href="../index.html#home" class="nav-link">Home</a></li>
                <li><a href="fun.html" class="nav-link">Back to Fun</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="dice-container">
        <h1 class="dice-title">🎲 3D Dice Roller 🎲</h1>
        
        <div class="dice-wrapper">
            <div class="dice-scene">
                <div id="dice-1" class="dice">
                    <div class="dice-face face-1"><div class="dot"></div></div>
                    <div class="dice-face face-2">
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <div class="dice-face face-3">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <div class="dice-face face-4">
                        <div style="display: flex; gap: 5px;"><div class="dot"></div><div class="dot"></div></div>
                        <div style="display: flex; gap: 5px;"><div class="dot"></div><div class="dot"></div></div>
                    </div>
                    <div class="dice-face face-5">
                        <div style="display: flex; gap: 5px;"><div class="dot"></div><div class="dot"></div></div>
                        <div class="dot"></div>
                        <div style="display: flex; gap: 5px;"><div class="dot"></div><div class="dot"></div></div>
                    </div>
                    <div class="dice-face face-6">
                        <div style="display: flex; gap: 5px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div style="display: flex; gap: 5px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                </div>
            </div>

            <div class="dice-scene">
                <div id="dice-2" class="dice">
                    <div class="dice-face face-1"><div class="dot"></div></div>
                    <div class="dice-face face-2">
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <div class="dice-face face-3">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <div class="dice-face face-4">
                        <div style="display: flex; gap: 5px;"><div class="dot"></div><div class="dot"></div></div>
                        <div style="display: flex; gap: 5px;"><div class="dot"></div><div class="dot"></div></div>
                    </div>
                    <div class="dice-face face-5">
                        <div style="display: flex; gap: 5px;"><div class="dot"></div><div class="dot"></div></div>
                        <div class="dot"></div>
                        <div style="display: flex; gap: 5px;"><div class="dot"></div><div class="dot"></div></div>
                    </div>
                    <div class="dice-face face-6">
                        <div style="display: flex; gap: 5px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div style="display: flex; gap: 5px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <button id="roll-button" class="roll-btn">Roll Dice</button>
        <div id="result" class="result-text"></div>
        <a href="fun.html" class="back-btn">← Back to Fun Section</a>
    </div>

    <script src="../js/script.js"></script>
    <script>
        const dice1 = document.getElementById('dice-1');
        const dice2 = document.getElementById('dice-2');
        const rollBtn = document.getElementById('roll-button');
        const resultText = document.getElementById('result');

        // Rotation values for each face (in degrees)
        const rotations = {
            1: { x: 0, y: 0 },
            2: { x: 0, y: 180 },
            3: { x: 0, y: 90 },
            4: { x: 0, y: -90 },
            5: { x: 90, y: 0 },
            6: { x: -90, y: 0 }
        };

        function rollDice() {
            rollBtn.disabled = true;
            resultText.textContent = 'Rolling...';

            // Random rotations for rolling effect
            const randomRotations1 = {
                x: Math.random() * 720,
                y: Math.random() * 720
            };
            const randomRotations2 = {
                x: Math.random() * 720,
                y: Math.random() * 720
            };

            dice1.style.transform = `rotateX(${randomRotations1.x}deg) rotateY(${randomRotations1.y}deg)`;
            dice2.style.transform = `rotateX(${randomRotations2.x}deg) rotateY(${randomRotations2.y}deg)`;

            setTimeout(() => {
                const val1 = Math.floor(Math.random() * 6) + 1;
                const val2 = Math.floor(Math.random() * 6) + 1;

                const rot1 = rotations[val1];
                const rot2 = rotations[val2];

                dice1.style.transform = `rotateX(${rot1.x}deg) rotateY(${rot1.y}deg)`;
                dice2.style.transform = `rotateX(${rot2.x}deg) rotateY(${rot2.y}deg)`;

                resultText.textContent = `You rolled a ${val1 + val2}! 🎉`;
                rollBtn.disabled = false;
            }, 1000);
        }

        rollBtn.addEventListener('click', rollDice);

        // Initial state
        resultText.textContent = 'Click "Roll Dice" to start!';
    </script>
</body>
</html>
